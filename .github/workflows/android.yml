name: Android CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - run: pwd
    - name: set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    - name: apt
      run: sudo apt update &&
           sudo apt install -y --no-install-recommends
            clang
            cmake
            libconfig-dev
            libgtest-dev
            ninja-build
            pkg-config
            zip grep file ca-certificates autotools-dev autoconf automake
            git bc wget rsync cmake make pkg-config libtool
            ssh gzip tar
            coreutils

    - run: cd ~/ ; ln -s /home/runner/work/pkgs_ToxAndroidRefImpl/pkgs_ToxAndroidRefImpl/ ./work ;
           ls -al ~/ ;
           mkdir -p ~/work/deploy ;
           mkdir -p ~/.android/ ;
           touch ~/.android/debug.keystore ;
           cd ~/work/ ;
           mkdir -p build_dir ; cd build_dir ; pwd ; ls -al ; bash ../circle_scripts/deps.sh ;
           cd build_dir ; bash ../circle_scripts/trifa.sh '../'

    #- name: Install NDK
    #  run: echo "y" | sudo /usr/local/lib/android/sdk/tools/bin/sdkmanager --install "ndk;21.0.6113669" --sdk_root=${ANDROID_SDK_ROOT}

    #- name: Build with Gradle
