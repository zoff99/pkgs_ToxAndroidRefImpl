name: Android CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - run: pwd
    - name: set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    #- name: apt
    #  run: sudo apt update &&
    #       sudo apt install -y --no-install-recommends
    #        clang
    #        cmake
    #        libconfig-dev
    #        libgtest-dev
    #        ninja-build
    #        pkg-config
    #        zip grep file ca-certificates autotools-dev autoconf automake
    #        git bc wget rsync cmake make pkg-config libtool
    #        ssh gzip tar
    #        coreutils

    - run: pwd ;
           sudo git clone https://github.com/zoff99/ToxAndroidRefImpl /root/work ;
           sudo chmod a+rwx /root/ ; sudo chmod a+rwx /root/work ;
           sudo mkdir -p /root/work/deploy ;
           sudo mkdir -p /root/.android/ ;
           sudo touch /root/.android/debug.keystore ;
           cd /root/work/ ;
           sudo mkdir -p build_dir ; sudo chmod a+rwx /root/work/build_dir ;
           cd /root/work/build_dir/ ; pwd ; ls -al ../ ; sudo bash /root/work/circle_scripts/deps.sh ;
           cd /root/work/build_dir/ ; sudo bash /root/work/circle_scripts/trifa.sh '../'

